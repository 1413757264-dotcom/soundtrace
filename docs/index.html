<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const canvas=document.getElementById('bg-canvas');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2('#0D0D0C',0.00012);
const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,0,7);
scene.add(new THREE.AmbientLight('#666666',0.3));
const key=new THREE.DirectionalLight('#ffffff',2);
key.position.set(5,8,5);key.castShadow=true;scene.add(key);
scene.add(new THREE.DirectionalLight('#888888',1).position.set(-3,-1,-3));
const pt1=new THREE.PointLight('#ffffff',25,10);pt1.position.set(3,2,-2);scene.add(pt1);
const pt2=new THREE.PointLight('#888888',15,8);pt2.position.set(-4,-1,-1);scene.add(pt2);
const mat1=new THREE.MeshStandardMaterial({color:'#B8B8B2',roughness:0.55,metalness:0.45});
const mat2=new THREE.MeshStandardMaterial({color:'#888882',roughness:0.6,metalness:0.4});
const mat3=new THREE.MeshStandardMaterial({color:'#D4D4D0',roughness:0.5,metalness:0.5});
function addGeo(geo,mat,pos,rot){const m=new THREE.Mesh(geo,mat);m.castShadow=true;m.position.set(...pos);if(rot)m.rotation.set(...rot);scene.add(m);return m}
const geos=[
  addGeo(new THREE.TorusKnotGeometry(1,0.2,100,16),mat1,[3.5,1.5,-2]),
  addGeo(new THREE.BoxGeometry(1.4,1.4,1.4),mat2,[-3,-0.5,-1.5],[0.5,0.8,0.3]),
  addGeo(new THREE.IcosahedronGeometry(0.45,1),mat3,[2,3,-2.5]),
  addGeo(new THREE.TorusGeometry(0.8,0.06,32,80),mat1,[-2,1.5,-3.5],[1.2,0.3,0]),
  addGeo(new THREE.OctahedronGeometry(0.5,0),mat2,[3,-2,-2]),
];
let mx=0,my=0,tmx=0,tmy=0;
window.addEventListener('mousemove',e=>{tmx=(e.clientX/window.innerWidth)*2-1;tmy=(e.clientY/window.innerHeight)*2-1});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  mx+=(tmx-mx)*0.04;my+=(tmy-my)*0.04;
  camera.position.x+=mx*0.6-camera.position.x*0.03;
  camera.position.y+=-my*0.4-camera.position.y*0.03;
  camera.lookAt(0,0,-1);
  geos.forEach((g,i)=>{g.rotation.x+=0.002*(i+1);g.rotation.y+=0.003*(i+1)});
  pt1.intensity=25+Math.sin(t*0.7)*6;
  pt2.intensity=15+Math.cos(t*0.5)*4;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
</script>

          return '<div class="track" style="border-left-color:'+c+'" onclick="openSong(\''+s.id+'\',\''+esc(s.title)+'\',\''+s.release_year+'\',\''+(s.bpm||'')+'\',\''+esc(s.key||'')+'\',\''+(s.sub_genre||'')+'\',\''+esc(s.album)+'\')">'+
            '<span class="track-title">'+s.title+'</span>'+
            '<span class="track-meta">'+(s.bpm||'')+'BPM '+(s.key||'')+'</span>'+
            (s.sample_count>0?'<span class="track-badge">'+s.sample_count+'</span>':'')+
            '</div>';
        }).join('')+'</div></div>';
    }).join('');

    buildDataPage();
    buildLifePage();
    setupScrollObserver();
  }catch(e){console.error(e);}
}

function toggleEra(i){document.getElementById('era-'+i).classList.toggle('open');}

function setupScrollObserver(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});
  },{threshold:0.1,rootMargin:'0px 0px -60px 0px'});
  document.querySelectorAll('.era').forEach(function(el){obs.observe(el)});
}

async function openSong(id,title,year,bpm,key,genre,album){
  var modal=document.getElementById('modal');
  var content=document.getElementById('modal-content');
  modal.classList.add('open');document.body.style.overflow='hidden';
  content.innerHTML='<p style="color:var(--sub);text-align:center;padding:60px 0">加载中...</p>';
  try{
    var r=await fetch(API+'/search/enrich?song_id='+id);
    var d=await r.json();
    var x=d.data||{};
    var samples=x.samples||[];
    var credits=x.credits||[];
    var ai=x.album_intro;
    content.innerHTML=
      '<p class="modal-album">'+escHtml(album||'')+'</p>'+
      '<div class="modal-rule"></div>'+
      '<h2 class="modal-title">'+escHtml(title||'')+'</h2>'+
      '<p class="modal-artist">KANYE WEST</p>'+
      '<div class="modal-meta">'+
      '<div><span class="modal-meta-num">'+(year||'-')+'</span><span class="modal-meta-lab">年份</span></div>'+
      '<div><span class="modal-meta-num">'+(bpm||'-')+'</span><span class="modal-meta-lab">BPM</span></div>'+
      '<div><span class="modal-meta-num">'+(key||'-')+'</span><span class="modal-meta-lab">调式</span></div>'+
      '<div><span class="modal-meta-num">'+samples.length+'</span><span class="modal-meta-lab">采样</span></div></div>'+
      (x.theme?'<div class="modal-block"><p class="modal-block-label">创作主题</p><p class="modal-block-text">'+escHtml(x.theme)+'</p></div>':'')+
      (x.context?'<div class="modal-block"><p class="modal-block-label">采样故事</p><p class="modal-block-text">'+escHtml(x.context)+'</p></div>':'')+
      (credits.length?'<div class="modal-block"><p class="modal-block-label">制作团队</p><p class="modal-block-text">'+credits.map(function(c){return escHtml(c.artist_name)+' <span style="color:var(--sub)">'+c.role+'</span>'}).join(' · ')+'</p></div>':'')+
      '<div class="chain-section">'+
      '<p class="chain-head">采样 DNA</p>'+
      '<p class="chain-sub">'+samples.length+' 已确认采样源</p>'+
      (samples.length===0?'<p style="color:var(--sub);font-size:13px;padding:20px 0">无已知采样源。原创作品。</p>':
        samples.map(function(sp){
          var tc=TYPE_COLORS[sp.type]||'#C4C4BE';
          return '<div class="chain-card" style="border-left-color:'+tc+'">'+
            '<div class="chain-top">'+
            '<span class="chain-type" style="background:rgba(255,255,255,0.04);color:'+tc+'">'+(sp.type||'melody').toUpperCase().replace(/_/g,' ')+'</span>'+
            '<span class="chain-conf" style="color:'+tc+'">'+Math.round((sp.confidence||0)*100)+'%</span></div>'+
            '<p class="chain-source">'+escHtml(sp.source_title)+'</p>'+
            '<p class="chain-artist">'+escHtml(sp.source_artist)+(sp.source_year?' · '+sp.source_year:'')+'</p>'+
            (sp.description?'<p class="chain-desc">'+escHtml(sp.description)+'</p>':'')+'</div>';
        }).join(''))+
      '</div>'+
      (ai&&ai.bio?'<div class="album-ctx">'+
        '<p class="album-ctx-label">专辑背景</p>'+
        '<p class="album-ctx-name">'+escHtml(album||'')+'</p>'+
        '<p class="album-ctx-era">'+escHtml(ai.era||'')+'</p>'+
        '<p class="album-ctx-bio">'+escHtml(ai.bio)+'</p>'+
        '<div class="album-ctx-grid">'+
        '<div><span class="album-ctx-cell-lab">声音风格</span><span class="album-ctx-cell-val">'+escHtml(ai.sound||'')+'</span></div>'+
        '<div><span class="album-ctx-cell-lab">主题表达</span><span class="album-ctx-cell-val">'+escHtml(ai.theme||'')+'</span></div>'+
        '<div><span class="album-ctx-cell-lab">历史地位</span><span class="album-ctx-cell-val">'+escHtml(ai.legacy||'')+'</span></div>'+
        '</div></div>':'');
  }catch(e){content.innerHTML='<p style="color:var(--sub);text-align:center;padding:60px 0">加载失败</p>';}
}

function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeSearch();}});

function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('search-input').focus();},100);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
}
document.getElementById('search-input').addEventListener('input',async function(){
  var q=this.value.trim();
  var res=document.getElementById('search-results');
  if(q.length<1){res.innerHTML='';return;}
  try{
    var r=await fetch(API+'/search?q='+encodeURIComponent(q)+'&limit=50');
    var d=await r.json();
    if(!d.success)return;
    res.innerHTML=d.data.map(function(s){
      return '<div class="s-result" onclick="closeSearch();openSong(\''+s.id+'\',\''+esc(s.title)+'\',\''+s.release_year+'\',\''+(s.bpm||'')+'\',\''+esc(s.key_signature||'')+'\',\''+(s.sub_genre||'')+'\',\''+esc(s.album_title||'')+'\')">'+
        '<span class="s-result-title">'+s.title+'</span>'+
        '<span class="s-result-meta">'+s.release_year+(s.bpm?' · '+s.bpm+'BPM':'')+'</span>'+
        (s.sample_count>0?'<span class="s-result-badge">'+s.sample_count+'</span>':'')+'</div>';
    }).join('');
  }catch(e){}
});

function buildDataPage(){
  if(!allSongs.length)return;
  var ts=allSongs.reduce(function(t,s){return t+s.sample_count},0);
  var tc=allSongs.reduce(function(t,s){return t+s.credit_count},0);
  var st=allSongs.filter(function(s){return s.sample_count>0}).length;
  var tm=Math.floor(allSongs.reduce(function(t,s){return t+s.duration_ms},0)/60000);
  var ab=Math.round(allSongs.reduce(function(t,s){return t+(s.bpm||0)},0)/allSongs.length);
  var ms=Math.max.apply(null,albums.map(function(a){return a.totalSamples}).concat([1]));
  var top=allSongs.filter(function(s){return s.sample_count>0}).sort(function(a,b){return b.sample_count-a.sample_count}).slice(0,10);

  var dsHtml='';
  DOWNSTREAM_DATA.forEach(function(ds){
    dsHtml+='<div class="ds-card">'+
      '<div class="ds-top">'+
      '<div style="flex:1"><p class="ds-song">'+ds.song+'</p><p class="ds-artist">'+ds.artist+'</p></div>'+
      '<span class="ds-type">'+ds.type+'</span></div>'+
      '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'+
      '<span class="ds-arrow">源自</span>'+
      '<span class="ds-kanye">'+ds.kanyeSong+'</span>'+
      '<span style="color:var(--sub);font-size:10px">'+ds.album+'</span>'+
      '<span class="ds-year">'+ds.year+'</span></div></div>';
  });

  document.getElementById('data-page').innerHTML=
    '<p class="data-label">数据</p>'+
    '<h2 class="data-title">数据总览</h2>'+
    '<div class="big-row">'+
    '<div class="big-cell"><span class="big-num">'+allSongs.length+'</span><span class="big-lab">曲目</span></div>'+
    '<div class="big-cell"><span class="big-num">'+ts+'</span><span class="big-lab">采样</span></div>'+
    '<div class="big-cell"><span class="big-num">'+tc+'</span><span class="big-lab">制作</span></div></div>'+
    '<div class="sec-row">'+
    '<div class="sec-cell"><span class="sec-val">'+albums.length+'</span><span class="sec-lab">专辑</span></div>'+
    '<div class="sec-cell"><span class="sec-val">'+st+'</span><span class="sec-lab">含采样</span></div>'+
    '<div class="sec-cell"><span class="sec-val">'+tm+'</span><span class="sec-lab">分钟</span></div>'+
    '<div class="sec-cell"><span class="sec-val">'+ab+'</span><span class="sec-lab">平均BPM</span></div></div>'+
    '<div class="data-section"><p class="data-sec-head">专辑采样分布</p>'+
    albums.map(function(a){return '<div class="bar-row"><div class="bar" style="width:'+Math.max((a.totalSamples/ms)*120,2)+'px;background:var(--accent)"></div><span class="bar-name">'+a.name+'</span><span class="bar-stats">'+a.songs.length+'首 / '+a.totalSamples+'采样</span></div>'}).join('')+'</div>'+
    '<div class="data-section"><p class="data-sec-head">谁采样了 KANYE</p>'+dsHtml+'</div>'+
    '<div class="data-section"><p class="data-sec-head">采样最多</p>'+
    top.map(function(s,i){return '<div class="rank-row" onclick="openSong(\''+s.id+'\',\''+esc(s.title)+'\',\''+s.release_year+'\',\''+(s.bpm||'')+'\',\''+esc(s.key||'')+'\',\''+(s.sub_genre||'')+'\',\''+esc(s.album)+'\')"><span class="rank-num">'+String(i+1).padStart(2,'0')+'</span><div style="flex:1"><p class="rank-title">'+s.title+'</p><p class="rank-meta">'+s.album+' · '+s.release_year+'</p></div><span class="rank-samples">'+s.sample_count+' 采样</span></div>'}).join('')+'</div>';
}

function buildLifePage(){
  var page=document.getElementById('life-page');
  var html='<p class="life-label">生平纪事</p><h2 class="life-title">YE<br>的一生</h2>';
  LIFE_DATA.forEach(function(era){
    html+='<div class="life-era"><p class="life-era-head">'+era.era+'</p>';
    era.items.forEach(function(e){
      html+='<div class="life-entry"><div class="life-dot"></div><span class="life-year">'+e.y+'</span><p class="life-entry-title">'+e.t+'</p><p class="life-entry-body">'+e.b+'</p><div class="life-tags">'+e.tags.map(function(t){return '<span class="life-tag">'+t+'</span>'}).join('')+'</div></div>';
    });
    html+='</div>';
  });
  html+='<div style="height:80px"></div>';
  page.innerHTML=html;
}

document.querySelectorAll('.tabbar a[data-page]').forEach(function(link){
  link.addEventListener('click',function(e){
    e.preventDefault();
    document.querySelectorAll('.tabbar a').forEach(function(l){l.classList.remove('active')});
    this.classList.add('active');
    var page=this.dataset.page;
    document.getElementById('archive-view').style.display=page==='archive'?'':'none';
    document.getElementById('timeline').style.display=page==='archive'?'':'none';
    document.getElementById('data-page').classList.toggle('active',page==='data');
    document.getElementById('life-page').classList.toggle('active',page==='life');
    document.querySelector('.footer').style.display=(page==='data'||page==='life')?'none':'';
  });
});

buildLifePage();init();
</script>
</body>
</html>
